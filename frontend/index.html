<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg" href="/mano-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#030507" />
    <link rel="manifest" href="/manifest.json" />
    
    <title>MANO Attendance | Smart Attendance & Workforce Management</title>
    <meta name="description" content="MANO Attendance is a smart attendance and workforce management platform with geofencing, leave workflows, attendance reports, and payroll-ready exports." />
    <meta name="keywords" content="MANO Attendance, attendance software, workforce management, geofencing attendance, leave management, payroll reports" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="MANO" />

    <link rel="canonical" href="https://attendance.mano.co.in/" />
    <link rel="alternate" href="https://mano.co.in/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="MANO Attendance" />
    <meta property="og:title" content="MANO Attendance | Smart Attendance & Workforce Management" />
    <meta property="og:description" content="Track attendance, manage leave, enforce location compliance, and generate workforce insights with MANO Attendance." />
    <meta property="og:url" content="https://attendance.mano.co.in/" />
    <meta property="og:image" content="https://attendance.mano.co.in/showcase/rag-assistant.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MANO Attendance | Smart Attendance & Workforce Management" />
    <meta name="twitter:description" content="Attendance platform with geofencing, leave workflows, AI HR assistant, and payroll-ready reports." />
    <meta name="twitter:image" content="https://attendance.mano.co.in/showcase/rag-assistant.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://attendance.mano.co.in/#organization",
            "name": "MANO Attendance",
            "url": "https://attendance.mano.co.in/",
            "logo": {
              "@type": "ImageObject",
              "url": "https://attendance.mano.co.in/mano-logo.svg",
              "width": 192,
              "height": 192
            },
            "contactPoint": {
              "@type": "ContactPoint",
              "telephone": "+91 91360 96633",
              "contactType": "customer service"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://attendance.mano.co.in/#website",
            "url": "https://attendance.mano.co.in/",
            "name": "MANO Attendance",
            "publisher": { "@id": "https://attendance.mano.co.in/#organization" },
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://attendance.mano.co.in/?s={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          },
          {
            "@type": "WebPage",
            "@id": "https://attendance.mano.co.in/login/#webpage",
            "url": "https://attendance.mano.co.in/login",
            "name": "MANO Attendance Login",
            "description": "Securely log in to MANO Attendance to manage workforce, tracking, and reports.",
            "isPartOf": { "@id": "https://attendance.mano.co.in/#website" },
            "breadcrumb": {
              "@type": "BreadcrumbList",
              "itemListElement": [
                {
                  "@type": "ListItem",
                  "position": 1,
                  "name": "Home",
                  "item": "https://attendance.mano.co.in/"
                },
                {
                  "@type": "ListItem",
                  "position": 2,
                  "name": "Login",
                  "item": "https://attendance.mano.co.in/login"
                }
              ]
            }
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Static SEO Fallback: Header -->
      <div class="showcase-root site-bg">
        <header style="position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding: 0.5rem; background: rgba(0,0,0,0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.1);">
          <nav style="display: flex; align-items: center; justify-content: space-between; max-width: 1200px; margin: 0 auto; padding: 0 1rem;">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
              <img src="/mano-logo.svg" alt="Mano Logo" style="height: 1.75rem;" />
              <span style="color: white; font-weight: bold; font-size: 1.1rem;">MANO</span>
            </div>
            <div style="display: flex; gap: 1rem;">
              <a href="/login" style="color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.8rem; font-weight: 600;">Login</a>
            </div>
          </nav>
        </header>
        <main style="padding-top: 5rem; text-align: center; color: white;">
          <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Empowering your Workforce</h1>
          <p style="color: #a0aec0; max-width: 600px; margin: 0 auto 2rem;">The AI-driven platform for smart attendance, productivity analytics, and workforce governance.</p>
          <div style="display: flex; justify-content: center; gap: 1rem;">
            <a href="/login" style="background: linear-gradient(to right, #2563eb, #3b82f6); color: white; padding: 0.75rem 2rem; border-radius: 0.75rem; text-decoration: none; font-weight: bold;">Get Started</a>
          </div>
        </main>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
